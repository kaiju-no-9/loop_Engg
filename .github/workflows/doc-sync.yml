# Generated by loop-wizard v0.1
# Runs the doc-sync loop.

name: doc-sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run loop
        run: claude-code /loop doc-sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload STATE.md as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loop-state
          path: .loops/doc-sync/STATE.md
